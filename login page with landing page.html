<!DOCTYPE html>
<html>
<head>
    <title>User Authentication using Functions</title>
    
    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #eaff0046);
        }

        .box{
            width: 350px;
            margin: 100px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
            text-align: center;
        }

        h1{
            color: darkblue;
        }

        input{
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid gray;
            border-radius: 5px;
        }

        button{
            width: 95%;
            padding: 10px;
            background: blue;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }

        button:hover{
            background: darkblue;
        }

        #result{
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>Login Form</h1>

        <input type="text" id="username" placeholder="Enter Username">
        <input type="password" id="password" placeholder="Enter Password">

        <button onclick="login()">Login</button>

        <p id="result"></p>
    </div>

    <script>
        function login(){
            let user = document.getElementById("username").value;
            let pass = document.getElementById("password").value;

             user = user.toLowerCase();

            if(user === "sakshi" && pass === "7070"){
                window.location.href ="landing page.html";
            }
            else{
                document.getElementById("result").innerHTML = "Invalid Username or Password";
                document.getElementById("result").style.color = "red";
            }
        }
        
    </script>
+
</body>
</html>
