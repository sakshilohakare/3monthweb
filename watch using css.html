<!DOCTYPE html>
<html>
<head>
    <title>Product Card</title>
    <style>
        .card{
            width: 250px;
            border: 2px solid black;
            padding: 15px;
            margin: 50px auto;
            text-align: center;
            background-color: lightpink;
            border-radius: 10px;
            box-shadow : 5px 5px
        }

        img{
            width: 150px;
            height: 150px;
        }

        button{
            padding: 8px 15px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="watch.jpg" alt="Product">
        <h2>Smart Watch</h2>
        <p>Price: ₹1,999</p>
        <button>Buy Now</button>
    </div>

</body>
</html>
