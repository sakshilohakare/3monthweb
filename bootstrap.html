<!DOCTYPE html>
<html lang="en">
<head>
    <!--
    Bootstrap Classes Used in This Example:

    container    = Creates a responsive container
    mt-5         = Adds top margin
    text-primary = Makes text blue
    text-center  = Centers text horizontally
    text-success = Makes text green

    btn          = Basic Bootstrap button
    btn-primary  = Blue button
    btn-success  = Green button
    btn-danger   = Red button
    btn-warning  = Yellow button

    card         = Creates a card component
    p-3          = Adds padding

    row          = Creates a Bootstrap grid row
    col          = Creates equal-width columns

    bg-light     = Light background color
    border       = Adds border around element

    Bootstrap CDN:
    Loads all Bootstrap CSS classes from the Bootstrap framework.
    -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Demo</title>

    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <!-- Container -->
    <div class="container mt-5">

        <!-- Heading -->
        <h1 class="text-primary text-center">
            Welcome to Bootstrap
        </h1>

        <!-- Paragraph -->
        <p class="text-success">
            This is a simple Bootstrap example.
        </p>

        <!-- Buttons -->
        <button class="btn btn-primary">
            Primary Button
        </button>

        <button class="btn btn-success">
            Success Button
        </button>

        <button class="btn btn-danger">
            Danger Button
        </button>

        <hr>

        <!-- Card -->
        <div class="card p-3">
            <h3 class="text-dark">Product Card</h3>
            <p>This is a Bootstrap card.</p>
            <button class="btn btn-warning">
                Buy Now
            </button>
        </div>

        <hr>

        <!-- Grid System -->
        <div class="row">
            <div class="col bg-light p-5">
                Column 1
            </div>

            <div class="col bg-light p-3 border">
                Column 2
            </div>

            <div class="col bg-light p-3 border">
                Column 3
            </div>
        </div>

    </div>

</body>
</html>
