<!DOCTYPE html>
<html>
<head>
    <title>Image Change with All Selectors</title>

    <style>
        h1{
            color: darkblue;
            text-align: center;
        }

        img{
            width: 150px;
            height: 150px;
            margin: 10px;
            border: 2px solid black;
        }

        button{
            margin-top: 20px;
            padding: 10px 20px;
        }
    </style>
</head>
<body>

    <h1>JavaScript Selectors - Change Images</h1>

    <img id="img1" src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=200">

    <img class="pic" src="https://images.unsplash.com/photo-1490750967868-88aa4486c946?w=200"> </br>

    <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?w=200">

    <img class="photo" src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=200"> </br>

    <img class="gallery" src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=200">

    <img class="gallery" src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=200">

    <br><br>
    <button onclick="changeImages()">Change Images</button>

    <script>
        function changeImages() {
            document.getElementById("img1").src =
                "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=200";

            document.getElementsByClassName("pic")[0].src =
                "https://images.unsplash.com/photo-1501004318641-b39e6451bec6?w=200";

            document.getElementsByTagName("img")[2].src =
                "https://images.unsplash.com/photo-1546182990-dffeafbe841d?w=200";

            document.querySelector(".photo").src =
                "https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?w=200";

            let images = document.querySelectorAll(".gallery");

            images[0].src =
                "https://images.unsplash.com/photo-1550547660-d9450f859349?w=200";

            images[1].src =
                "https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=200";
        }
    </script>

</body>
</html>
