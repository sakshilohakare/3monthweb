<!DOCTYPE html>
<html>
<head>
<title>Food Card</title>

<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100;
    margin:0;
    background-color:#f5f5f5;
    font-family:Arial;
}

.card{
    width:300px;
    border:2px solid #ccc;
    border-radius:15px;
    padding:15px;
    text-align:center;
    background:white;
    box-shadow:5px 5px 10px gray;
}

img{
    width:100%;
    border-radius:10px;
}

h2{
    color:darkred;
}

.price{
    color:green;
    font-size:22px;
    font-weight:bold;
}

button{
    background:orange;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
}
</style>

</head>
<body>

<div class="card">
    <img src="pizza.jpg" alt="Pizza">

    <h2>Delicious Pizza</h2>

    <p>Fresh cheesy pizza with extra toppings.</p>

    <p class="price">₹199</p>

    <button>Order Now</button>
</div>

</body>
</html>
