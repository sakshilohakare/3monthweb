<!DOCTYPE html>
<html>
<head>
    <style>
        :root {
            --text-color:  blue;
            --font-size: 30px;
        }    
        .box {
            --box-color: rgba(255, 192, 245, 0.966);


            color: var(--text-color);
            font-size: var(--font-size);
            background-color: var(--box-color);
            padding: 20px;
        }
        .boxes{
            color:var(--text-color);
            --box-color: rgb(0, 255, 251);
            padding: 20px;
            font-size: var(--font-size);
            background-color: var(--box-color);
        }
    </style>
    </head>
    <body>
        <div class="box">
            Welcome to CSS
           </div>

         <div class="boxes">
             This is Global and Local CSS example
            </div>
      </body>
      </html>
