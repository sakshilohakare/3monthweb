<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiple Attributes Example</title>
</head>
<body>

    <h1 id="heading" class="title" style="color: rgb(0, 111, 128);">
        Welcome to Sakshi World
    </h1>

    <p title="This is a paragraph" style="color: blue;" align="center">
        This is imaginary world made by V
    </p>

    <a href="https://www.google.com" target="_blank" title="Visit Google">
        Open Google
    </a>

    <br><br>

    <img src="https://in.pinterest.com/pin/541206080235029299/"
         alt="Sample Image"
         width="200"
         height="150"
         title="Placeholder Image">

    <br><br>

    <input type="text"
           placeholder="Enter your name"
           maxlength="20"
           required>

</body>
</html>
