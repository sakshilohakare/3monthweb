        }

            height: 160px;
            border: 3px solid #2b0066;
            border-radius: 10px;
            margin-right: 20px;
        }

        .details{
            font-size: 20px;
            line-height: 2;
        }

        .footer{
            background-color: #f7e7c6;
            color: #ab1608c3;
            text-align: center;
            padding: 10px;
            font-weight: bold;
        }
    </style>
</head>
