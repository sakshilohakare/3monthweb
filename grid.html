<!DOCTYPE html>
<html>
<head>
    <title>Jewellery Grid</title>

    <style>
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            border: 3px solid gold;
            padding: 15px;
            width: 500px;
            margin: auto;
        }

        .item {
            text-align: center;
            border: 1px solid black;
            padding: 10px;
        }

        .item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <h2 align="center">Jewellery Collection</h2>

    <div class="container">
        <div class="item">
            <img src="ring.jpg" alt="Gold Ring">
            <p>Gold Ring</p>
        </div>

        <div class="item">
            <img src="necklace.jpg" alt="Necklace">
            <p>Diamond Necklace</p>
        </div>

        <div class="item">
            <img src="bracelet.jpg" alt="Bracelet">
            <p>Silver Bracelet</p>
        </div>

        <div class="item">
            <img src="earrings.jpg" alt="Earrings">
            <p>Pearl Earrings</p>
        </div>
    </div>

</body>
</html>
